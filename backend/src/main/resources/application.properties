# Default configuration for this application
# Values will apply for all environments unless overridden by environment (in $PWD/config/application.properties)
# or prefixed with %dev. or %test.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=quarkus
quarkus.datasource.password=quarkus
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/quarkus
quarkus.flyway.create-schemas=true
quarkus.flyway.migrate-at-start=true
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:5173,http://localhost:8080
quarkus.http.cors.headers=accept, authorization, content-type, x-requested-with
quarkus.http.cors.methods=GET, POST, OPTIONS, DELETE
quarkus.devservices.enabled=true
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.hibernate-orm.validate-in-dev-mode=true
%dev.quarkus.flyway.schemas=quarkus
quarkus.rest-client.bored-api.url=https://www.boredapi.com/api/
# OIDC Configuration
%dev.quarkus.keycloak.devservices.enabled=false
quarkus.oidc.auth-server-url=http://localhost:8180/realms/quarkus
quarkus.oidc.client-id=backend-service
quarkus.oidc.credentials.secret=0239ZYwgcE6Z85xRbczhXFnGbuPZyf8x
# web-app: browser gets redirected to Keycloak login page and back
# service (default): expects a Bearer token, returns 401 if missing
quarkus.oidc.application-type=web-app
quarkus.oidc.token.principal-claim=sub
quarkus.oidc.authentication.verify-access-token-with-user-info=false

# Validate Token Signature
quarkus.oidc.token.validate-token=true

# Security Configuration - extract roles from the access token's "roles" claim
quarkus.oidc.roles.role-claim-path=roles
quarkus.oidc.roles.source=accesstoken

# HTTP Authentication Permissions - Define which paths require authentication
# Require authentication for /task/* endpoints
quarkus.http.auth.permission.require-auth.paths=/task/*
quarkus.http.auth.permission.require-auth.policy=authenticated
# Allow public access to OpenAPI and health endpoints
quarkus.http.auth.permission.public-health.paths=/health,/health/*
quarkus.http.auth.permission.public-health.policy=permit
quarkus.http.auth.permission.public-api-spec.paths=/q/openapi*,/q/swagger-ui*
quarkus.http.auth.permission.public-api-spec.policy=permit
# Example endpoints require authentication but check roles separately
quarkus.http.auth.permission.example-auth.paths=/example/*
quarkus.http.auth.permission.example-auth.policy=authenticated

# Development Settings
%dev.quarkus.oidc.tls.verification=none
%dev.quarkus.rest-client.logging.scope=request-response

# Test Settings
%test.quarkus.keycloak.devservices.enabled=true
%test.quarkus.keycloak.devservices.port=8180
%test.quarkus.oidc.credentials.grant-type=password
%test.quarkus.oidc.authentication.direct-grants=true
%test.quarkus.rest-client.logging.scope=request-response
quarkus.log.level=DEBUG
# OpenAPI
quarkus.smallrye-openapi.info-title=Task API
%dev.quarkus.smallrye-openapi.info-title=Task API (development)
%test.quarkus.smallrye-openapi.info-title=Task API (test)
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=A service to manage tasks
quarkus.smallrye-openapi.info-contact-email=techsupport@example.com
quarkus.smallrye-openapi.info-contact-name=Task API Support
quarkus.smallrye-openapi.info-contact-url=http://exampleurl.com/contact
quarkus.smallrye-openapi.operation-id-strategy=method
# Generate OpenAPI spec at build-time (can be grabbed and published in schema repository by CI process)
quarkus.smallrye-openapi.store-schema-directory=target/openapi
# Custom application configurations
app.services.ollama.model=${OLLAMA_MODEL:llama3.2}
app.services.ollama.keep-alive-time=${OLLAMA_KEEP_ALIVE_TIME:10m}
quarkus.rest-client.ollama_api_yaml.uri=${OLLAMA_HOST:http://localhost:11434}
