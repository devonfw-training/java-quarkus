version: "3.8"

services:
  quarkus-app:
    build:
      context: ./backend
      dockerfile: src/main/docker/Dockerfile.jvm
    image: quarkus-backend
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://quarkus-db:5432/quarkus
      - QUARKUS_FLYWAY_SCHEMAS=quarkus
    ports:
      - "8080:8080"  # the HTTP endpoint
    depends_on:
      quarkus-db:
        condition: service_healthy
    networks:
      - quarkus

  quarkus-db:
    image: postgres:15.1
    restart: always
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=quarkus
      - POSTGRES_PASSWORD=quarkus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quarkus"]
      interval: 5s
      timeout: 5s
      retries: 6
    ports:
      - "5432:5432"
    networks:
      - quarkus

  keycloak:
    image: jba/keycloak
    build:
      context: docker/keycloak
      dockerfile: Dockerfile
    container_name: keycloak
    command: "start-dev --import-realm --verbose"
    environment:
      KC_DB: ${KC_DB}
      KC_DB_URL: ${KC_DB_URL}
      KC_DB_USERNAME: ${KC_DB_USERNAME}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${KC_ADMIN_USERNAME}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: ${KC_HEALTH_ENABLED}
      KC_METRICS_ENABLED: ${KC_METRICS_ENABLED}
      QUARKUS_TRANSACTION_MANAGER_ENABLE_RECOVERY: true
    ports:
      - "8088:8080"
    volumes:
      - ./docker/keycloak/import:/opt/keycloak/data/import
    depends_on:
      - quarkus-db
    networks:
      - quarkus
networks:
  quarkus:
    driver: bridge

volumes:
  db-data:
    driver: local
